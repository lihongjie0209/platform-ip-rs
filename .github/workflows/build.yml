name: Build and Push

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

env:
  ACR_REGISTRY: registry.cn-beijing.aliyuncs.com
  ACR_NAMESPACE: lihongjie
  ACR_IMAGE: platform-ip-rs

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Docker tag
        id: tag
        run: |
          BRANCH=${GITHUB_REF_NAME//\//-}
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "timestamp=$TIMESTAMP" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_IMAGE }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.branch }}-${{ steps.tag.outputs.timestamp }}
            ${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.branch }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
